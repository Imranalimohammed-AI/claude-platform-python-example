name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  syntax-check:
    name: Python Syntax & Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Check Python syntax
        run: |
          find . -name "*.py" ! -path "./.venv/*" ! -path "./.git/*" \
            | xargs -I {} python -m py_compile {}
          echo "All files OK"
      - name: Scan for hardcoded API keys
        run: |
          if grep -rn -e "sk-ant-" --include="*.py" --include="*.md" .; then
            echo "ERROR: Hardcoded API key detected" && exit 1
          fi
          echo "Clean"
      - name: Verify .env is gitignored
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked" && exit 1
          fi
          echo ".env correctly ignored"
